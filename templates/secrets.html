<!-- ============================================================================
     secrets.html — Secrets Page Template (Protected Content)
     ============================================================================
     This template is the protected content page that only authenticated users can see.
     It displays:
       - A personalized welcome message with the user's name.
       - A download link for a restricted file (cheat_sheet.pdf).
     This page is served by the secrets() route, which is decorated with @login_required.
     ============================================================================ -->

<!-- Inherit the layout, head, navbar, and styles from the base template (base.html). -->
{% extends "base.html" %}

<!-- Begin the content block — this replaces the block content placeholder in base.html. -->

{% block content %}

<!-- Main content container — uses the .container class for centered layout with top margin.
     This is styled differently from .box (used in login/register) with a larger top margin. -->
<div class="container">

  <!-- Personalized welcome heading:
       The {{ name }} variable is passed from the Flask secrets() route function.
       It displays the current user's name (e.g., "Welcome, John!").
       The .title class applies white text with a subtle text shadow for readability. -->
  <h1 class="title">Welcome, {{name}}!</h1>

  <!-- File download link:
       url_for('download') generates the URL for the '/download' route.
       When clicked, the browser navigates to the download() function, which securely
       serves 'static/files/cheat_sheet.pdf' using send_from_directory().
       This route is also protected by @login_required, so the download only works
       for authenticated users. -->
  <a href="{{ url_for('download') }}">Download Your File</a>

</div>
<!-- End of .container. -->

<!-- End of the content block. -->
{% endblock %}
